steps:
  # ── Backend ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow-backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/venueflow-backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'venueflow-backend'
      - '--image=gcr.io/$PROJECT_ID/venueflow-backend:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID'
    waitFor: ['push-backend']

  # ── Frontend ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow-frontend:latest'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/venueflow-frontend']
    waitFor: ['build-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'venueflow-frontend'
      - '--image=gcr.io/$PROJECT_ID/venueflow-frontend:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/venueflow-backend'
  - 'gcr.io/$PROJECT_ID/venueflow-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
