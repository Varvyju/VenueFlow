<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VenueFlow – Smart Stadium Experience Platform. Real-time crowd management powered by AI." />
  <title>VenueFlow – Smart Stadium AI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --secondary: #34a853;
      --warning: #fbbc04;
      --danger: #ea4335;
      --surface: #ffffff;
      --surface-2: #f8f9fa;
      --text: #202124;
      --text-secondary: #5f6368;
      --border: #dadce0;
      --radius: 12px;
      --shadow: 0 2px 10px rgba(0,0,0,0.12);
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, -apple-system, sans-serif;
      background: #f0f4ff;
      color: var(--text);
      min-height: 100vh;
    }

    /* Skip link for accessibility */
    .skip-link {
      position: absolute; top: -40px; left: 6px;
      background: var(--primary); color: #fff;
      padding: 8px 16px; border-radius: 4px;
      text-decoration: none; font-weight: 600;
      z-index: 1000;
      transition: top var(--transition);
    }
    .skip-link:focus { top: 6px; }

    header {
      background: var(--primary);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 28px; }
    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo p { font-size: 12px; opacity: 0.85; }

    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-toggle button {
      padding: 8px 20px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.8);
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .mode-toggle button.active,
    .mode-toggle button:hover {
      background: rgba(255,255,255,0.3);
      color: #fff;
    }

    .mode-toggle button:focus-visible {
      outline: 2px solid #fff;
      outline-offset: -2px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 18px; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }
    .upload-zone:hover, .upload-zone:focus-within {
      border-color: var(--primary);
      background: #e8f0fe;
    }
    .upload-zone input { display: none; }
    .upload-zone label { cursor: pointer; font-size: 15px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      border-radius: 8px;
      border: none; cursor: pointer;
      font-size: 14px; font-weight: 600;
      transition: all var(--transition);
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { background: #e8f0fe; }
    .btn-danger { background: var(--danger); color: #fff; }

    /* Chat */
    .chat-messages {
      height: 280px;
      overflow-y: auto;
      padding: 12px;
      background: var(--surface-2);
      border-radius: 8px;
      margin-bottom: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.5;
    }
    .msg.ai .msg-bubble { background: #e8f0fe; color: var(--text); }
    .msg.user .msg-bubble { background: var(--primary); color: #fff; }

    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input {
      flex: 1; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px;
    }
    .chat-input-row input:focus {
      outline: 3px solid var(--primary); outline-offset: 0;
      border-color: var(--primary);
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-low { background: #e6f4ea; color: #1e7e34; }
    .badge-medium { background: #fef7e0; color: #b06000; }
    .badge-high { background: #fce8e6; color: #c5221f; }
    .badge-critical { background: var(--danger); color: #fff; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Heatmap zones grid */
    .zones-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .zone-card {
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .zone-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .zone-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .zone-stats { font-size: 13px; color: var(--text-secondary); }
    .occupancy-bar {
      height: 6px; border-radius: 3px;
      background: var(--border); margin: 8px 0;
    }
    .occupancy-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.8s ease;
    }

    /* Result panels */
    .result-panel {
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid var(--primary);
      background: #e8f0fe;
      margin-top: 16px;
    }
    .result-panel.warn { border-color: var(--warning); background: #fef7e0; }
    .result-panel.danger { border-color: var(--danger); background: #fce8e6; }

    /* Route steps */
    .route-step {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .step-num {
      min-width: 28px; height: 28px;
      border-radius: 50%; background: var(--primary);
      color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* Alerts */
    .alert-item {
      padding: 12px 16px;
      border-radius: 8px; margin-bottom: 10px;
      border-left: 4px solid;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .alert-item.info { border-color: var(--primary); background: #e8f0fe; }
    .alert-item.warning { border-color: var(--warning); background: #fef7e0; }
    .alert-item.danger { border-color: var(--danger); background: #fce8e6; }

    /* Form elements */
    select, input[type="text"], input[type="number"], textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; margin-top: 4px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.25);
    }

    label { font-size: 14px; font-weight: 600; color: var(--text-secondary); }

    .form-group { margin-bottom: 14px; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats row */
    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-item {
      flex: 1; min-width: 120px;
      padding: 16px;
      background: var(--surface-2);
      border-radius: 10px;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 13px; color: var(--text-secondary); }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─────────────────────── API Config ──────────────────────
    const API_BASE = "https://venueflow-backend-158600067035.us-central1.run.app"; //

    const api = {
      async post(path, body) {
        const res = await fetch(`${API_BASE}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error((await res.json()).detail || "Request failed");
        return res.json();
      },
      async postForm(path, formData) {
        const res = await fetch(`${API_BASE}${path}`, {
          method: "POST",
          body: formData,
        });
        if (!res.ok) throw new Error((await res.json()).detail || "Upload failed");
        return res.json();
      },
      async get(path) {
        const res = await fetch(`${API_BASE}${path}`);
        if (!res.ok) throw new Error((await res.json()).detail || "Request failed");
        return res.json();
      },
    };

    // ─────────────────────── Helpers ─────────────────────────
    const CrowdBadge = ({ level }) => (
      <span className={`badge badge-${level}`} aria-label={`Crowd level: ${level}`}>
        {level}
      </span>
    );

    const OccupancyBar = ({ percent }) => {
      const color = percent >= 85 ? "#ea4335" : percent >= 65 ? "#fbbc04" : "#34a853";
      return (
        <div className="occupancy-bar" role="progressbar"
             aria-valuenow={percent} aria-valuemin={0} aria-valuemax={100}
             aria-label={`${percent}% occupied`}>
          <div className="occupancy-fill" style={{ width: `${percent}%`, background: color }} />
        </div>
      );
    };

    // ──────────────────── Fan: Photo Analysis ─────────────────
    function CrowdAnalyzer() {
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const inputRef = useRef();

      const handleFile = (f) => {
        if (!f || !f.type.startsWith("image/")) return;
        setFile(f);
        setPreview(URL.createObjectURL(f));
        setResult(null);
        setError(null);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
      };

      const analyze = async () => {
        if (!file) return;
        setLoading(true); setError(null);
        try {
          const fd = new FormData();
          fd.append("file", file);
          const data = await api.postForm("/api/fan/analyze", fd);
          setResult(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const panelClass = result
        ? result.crowd_level === "critical" ? "result-panel danger"
        : result.crowd_level === "high" ? "result-panel warn"
        : "result-panel"
        : "result-panel";

      return (
        <article className="card" aria-labelledby="analyzer-heading">
          <h2 id="analyzer-heading">📸 Crowd Analyzer</h2>
          <p style={{color:"#5f6368",fontSize:"14px",marginBottom:"16px"}}>
            Upload a photo of your queue or gate — AI estimates wait time and suggests alternatives.
          </p>

          <div className="upload-zone"
               onDrop={handleDrop}
               onDragOver={e => e.preventDefault()}
               role="button" tabIndex={0}
               aria-label="Upload a crowd photo. Drag and drop or click to browse."
               onKeyDown={e => e.key === "Enter" && inputRef.current.click()}>
            <input ref={inputRef} type="file" accept="image/jpeg,image/png,image/webp"
                   id="crowd-upload"
                   onChange={e => handleFile(e.target.files[0])}
                   aria-describedby="upload-hint" />
            <label htmlFor="crowd-upload">
              {preview
                ? <img src={preview} alt="Uploaded crowd photo preview"
                       style={{maxHeight:"180px",borderRadius:"8px",marginBottom:"8px"}} />
                : <div style={{fontSize:"40px",marginBottom:"8px"}}>📷</div>
              }
              <div id="upload-hint" style={{fontSize:"14px",color:"#5f6368"}}>
                {file ? file.name : "Drag & drop or click to upload (JPEG, PNG, WebP · max 5MB)"}
              </div>
            </label>
          </div>

          <button className="btn btn-primary" style={{marginTop:"16px",width:"100%"}}
                  onClick={analyze} disabled={!file || loading}
                  aria-busy={loading}>
            {loading ? <><span className="spinner" role="status" aria-label="Analysing…" /> Analysing…</> : "🔍 Analyse Crowd"}
          </button>

          {error && (
            <div role="alert" style={{color:"#c5221f",marginTop:"12px",fontSize:"14px"}}>
              ⚠️ {error}
            </div>
          )}

          {result && (
            <section className={panelClass} aria-live="polite" aria-label="Analysis result">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                <strong style={{fontSize:"16px"}}>Analysis Result</strong>
                <CrowdBadge level={result.crowd_level} />
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
                <div>
                  <div style={{fontSize:"24px",fontWeight:"700"}}>{result.estimated_wait_minutes} min</div>
                  <div style={{fontSize:"12px",color:"#5f6368"}}>Estimated wait</div>
                </div>
                <div>
                  <div style={{fontSize:"24px",fontWeight:"700"}}>{result.crowd_density_percent.toFixed(0)}%</div>
                  <div style={{fontSize:"12px",color:"#5f6368"}}>Crowd density</div>
                </div>
              </div>
              <p style={{fontSize:"14px",marginBottom:"8px"}}>{result.ai_summary}</p>
              <p style={{fontSize:"14px",fontWeight:"600",color:"#1a73e8"}}>
                💡 {result.recommended_action}
              </p>
              <div style={{fontSize:"12px",color:"#5f6368",marginTop:"8px"}}>
                AI confidence: {(result.confidence_score * 100).toFixed(0)}%
              </div>
            </section>
          )}
        </article>
      );
    }

    // ──────────────────── Fan: Route Finder ──────────────────
    function RouteFinder() {
      const [form, setForm] = useState({
        current_gate: "A1",
        destination_type: "exit",
        venue_lat: "12.9716",
        venue_lng: "77.5946",
        language_code: "en",
      });
      const [route, setRoute] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const handleChange = (e) => setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));

      const findRoute = async () => {
        setLoading(true); setError(null);
        try {
          const data = await api.post("/api/fan/route", {
            ...form,
            venue_lat: parseFloat(form.venue_lat),
            venue_lng: parseFloat(form.venue_lng),
          });
          setRoute(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <article className="card" aria-labelledby="route-heading">
          <h2 id="route-heading">🗺️ Route Finder</h2>

          <div className="form-group">
            <label htmlFor="destination_type">Destination</label>
            <select id="destination_type" name="destination_type"
                    value={form.destination_type} onChange={handleChange}>
              <option value="exit">🚪 Nearest Exit</option>
              <option value="food">🍔 Food & Concessions</option>
              <option value="restroom">🚻 Restrooms</option>
              <option value="medical">🏥 Medical Aid</option>
            </select>
          </div>

          <div className="form-group">
            <label htmlFor="language_code">Language</label>
            <select id="language_code" name="language_code"
                    value={form.language_code} onChange={handleChange}>
              <option value="en">English</option>
              <option value="hi">हिंदी (Hindi)</option>
              <option value="kn">ಕನ್ನಡ (Kannada)</option>
              <option value="ta">தமிழ் (Tamil)</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="ar">العربية</option>
            </select>
          </div>

          <button className="btn btn-primary" style={{width:"100%"}}
                  onClick={findRoute} disabled={loading} aria-busy={loading}>
            {loading ? <><span className="spinner" aria-label="Finding route…" /> Finding Route…</> : "📍 Find Route"}
          </button>

          {error && <div role="alert" style={{color:"#c5221f",marginTop:"12px",fontSize:"14px"}}>⚠️ {error}</div>}

          {route && (
            <section style={{marginTop:"16px"}} aria-label="Walking route">
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
                <strong>To: {route.destination}</strong>
                <span style={{color:"#5f6368",fontSize:"14px"}}>
                  ~{Math.ceil(route.total_duration_seconds / 60)} min · {route.total_distance_meters}m
                </span>
              </div>
              {route.translated_summary && (
                <p style={{background:"#e8f0fe",padding:"10px",borderRadius:"8px",fontSize:"14px",marginBottom:"12px"}}>
                  {route.translated_summary}
                </p>
              )}
              <ol style={{listStyle:"none"}}>
                {route.steps.map((step, i) => (
                  <li key={i} className="route-step">
                    <div className="step-num" aria-hidden="true">{i + 1}</div>
                    <div>
                      <div style={{fontSize:"14px"}}>{step.instruction}</div>
                      <div style={{fontSize:"12px",color:"#5f6368"}}>
                        {step.distance_meters}m · ~{Math.ceil(step.duration_seconds / 60)} min
                      </div>
                    </div>
                  </li>
                ))}
              </ol>
            </section>
          )}
        </article>
      );
    }

    // ──────────────────── Fan: AI Chat ────────────────────────
    function FanChat() {
      const [messages, setMessages] = useState([
        { role: "ai", text: "Hi! I'm VenueFlow AI. Ask me about queues, exits, food, restrooms, or anything about the venue! 🏟️" }
      ]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [lang, setLang] = useState("en");
      const chatEndRef = useRef();

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      const send = async () => {
        const msg = input.trim();
        if (!msg || loading) return;
        setMessages(prev => [...prev, { role: "user", text: msg }]);
        setInput(""); setLoading(true);
        try {
          const data = await api.post("/api/fan/chat", {
            message: msg,
            language_code: lang,
            venue_context: "large IPL cricket stadium in Bangalore",
          });
          const reply = data.translated_reply || data.reply;
          setMessages(prev => [...prev, { role: "ai", text: reply }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: "ai", text: `⚠️ ${e.message}` }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <article className="card" aria-labelledby="chat-heading">
          <h2 id="chat-heading">🤖 AI Assistant</h2>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"8px"}}>
            <select value={lang} onChange={e => setLang(e.target.value)}
                    style={{width:"auto"}} aria-label="Select response language">
              <option value="en">English</option>
              <option value="hi">हिंदी</option>
              <option value="kn">ಕನ್ನಡ</option>
              <option value="ta">தமிழ்</option>
              <option value="es">Español</option>
            </select>
          </div>

          <div className="chat-messages" role="log" aria-label="Chat messages" aria-live="polite">
            {messages.map((m, i) => (
              <div key={i} className={`msg ${m.role}`}>
                <div className="msg-bubble">{m.text}</div>
              </div>
            ))}
            {loading && (
              <div className="msg ai">
                <div className="msg-bubble" style={{color:"#5f6368"}}>
                  <span aria-live="polite" aria-label="AI is typing">Typing…</span>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          <div className="chat-input-row">
            <input type="text" value={input}
                   onChange={e => setInput(e.target.value)}
                   onKeyDown={e => e.key === "Enter" && send()}
                   placeholder="Ask about queues, exits, food…"
                   aria-label="Type your message"
                   maxLength={1000} />
            <button className="btn btn-primary" onClick={send}
                    disabled={!input.trim() || loading} aria-label="Send message">
              ➤
            </button>
          </div>
        </article>
      );
    }

    // ──────────────────── Staff: Heatmap ─────────────────────
    function StaffHeatmap() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetch = useCallback(async () => {
        setLoading(true);
        try {
          const d = await api.get("/api/staff/heatmap");
          setData(d);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetch();
        const interval = setInterval(fetch, 30000); // Refresh every 30s
        return () => clearInterval(interval);
      }, [fetch]);

      if (loading) return <div className="card" role="status">Loading live data…</div>;
      if (error) return <div className="card" role="alert" style={{color:"#c5221f"}}>⚠️ {error}</div>;
      if (!data) return null;

      return (
        <article className="card" aria-labelledby="heatmap-heading">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
            <h2 id="heatmap-heading">📊 Live Crowd Heatmap</h2>
            <CrowdBadge level={data.overall_crowd_level} />
          </div>

          <div className="stat-row">
            <div className="stat-item">
              <div className="stat-value">{data.zones.length}</div>
              <div className="stat-label">Active Zones</div>
            </div>
            <div className="stat-item">
              <div className="stat-value">{data.total_occupancy_percent.toFixed(0)}%</div>
              <div className="stat-label">Avg Occupancy</div>
            </div>
            <div className="stat-item">
              <div className="stat-value" style={{color:"#ea4335"}}>
                {data.zones.filter(z => z.crowd_level === "critical").length}
              </div>
              <div className="stat-label">Critical Zones</div>
            </div>
          </div>

          <div className="zones-grid" role="list" aria-label="Stadium zones">
            {data.zones.map(zone => (
              <div key={zone.zone_id} className="zone-card" role="listitem"
                   aria-label={`${zone.zone_name}: ${zone.crowd_level} crowd, ${zone.occupancy_percent}% full`}>
                <div className="zone-name">{zone.zone_name}</div>
                <OccupancyBar percent={zone.occupancy_percent} />
                <div className="zone-stats">
                  <CrowdBadge level={zone.crowd_level} />
                  <span style={{marginLeft:"8px"}}>⏱ {zone.wait_minutes} min</span>
                </div>
              </div>
            ))}
          </div>

          <p style={{fontSize:"12px",color:"#5f6368",marginTop:"12px",textAlign:"right"}}>
            Last updated: {new Date(data.timestamp).toLocaleTimeString()} · Auto-refresh: 30s
          </p>
        </article>
      );
    }

    // ──────────────────── Staff: Alert Panel ─────────────────
    function StaffAlerts() {
      const [alerts, setAlerts] = useState([]);
      const [form, setForm] = useState({
        zone_id: "A1", message: "", severity: "info",
        broadcast_languages: ["en", "hi"],
      });
      const [loading, setLoading] = useState(false);

      const fetchAlerts = async () => {
        try {
          const data = await api.get("/api/staff/alerts?limit=10");
          setAlerts(data);
        } catch {}
      };

      useEffect(() => { fetchAlerts(); }, []);

      const broadcast = async () => {
        if (!form.message.trim()) return;
        setLoading(true);
        try {
          await api.post("/api/staff/alerts", form);
          setForm(prev => ({ ...prev, message: "" }));
          await fetchAlerts();
        } catch (e) {
          alert(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <article className="card" aria-labelledby="alerts-heading">
          <h2 id="alerts-heading">🚨 Alert Management</h2>

          <div className="form-group">
            <label htmlFor="alert-zone">Zone</label>
            <select id="alert-zone" value={form.zone_id}
                    onChange={e => setForm(p => ({...p, zone_id: e.target.value}))}>
              {["A1","B2","C3","D4","E5","F6"].map(z => (
                <option key={z} value={z}>{z}</option>
              ))}
            </select>
          </div>

          <div className="form-group">
            <label htmlFor="alert-severity">Severity</label>
            <select id="alert-severity" value={form.severity}
                    onChange={e => setForm(p => ({...p, severity: e.target.value}))}>
              <option value="info">ℹ️ Info</option>
              <option value="warning">⚠️ Warning</option>
              <option value="danger">🚨 Danger</option>
            </select>
          </div>

          <div className="form-group">
            <label htmlFor="alert-msg">Message (broadcast to fans)</label>
            <textarea id="alert-msg" rows={3}
                      value={form.message}
                      onChange={e => setForm(p => ({...p, message: e.target.value}))}
                      placeholder="e.g. Gate B is experiencing heavy congestion. Please use Gate D."
                      maxLength={500}
                      style={{resize:"vertical"}} />
          </div>

          <button className="btn btn-danger" onClick={broadcast}
                  disabled={!form.message.trim() || loading} style={{width:"100%"}}>
            {loading ? <><span className="spinner" /> Broadcasting…</> : "📢 Broadcast Alert"}
          </button>

          {alerts.length > 0 && (
            <section style={{marginTop:"20px"}} aria-label="Recent alerts">
              <h3 style={{fontSize:"14px",fontWeight:"700",marginBottom:"10px",color:"#5f6368"}}>
                RECENT ALERTS
              </h3>
              {alerts.slice(0, 5).map(a => (
                <div key={a.alert_id} className={`alert-item ${a.severity}`}
                     role="article" aria-label={`${a.severity} alert for zone ${a.zone_id}`}>
                  <div>
                    <div style={{fontWeight:"600",fontSize:"14px"}}>[{a.zone_id}] {a.message}</div>
                    <div style={{fontSize:"12px",color:"#5f6368",marginTop:"4px"}}>
                      {new Date(a.timestamp).toLocaleTimeString()}
                      {Object.keys(a.translations).length > 0 &&
                        ` · Translated to: ${Object.keys(a.translations).join(", ")}`}
                    </div>
                  </div>
                </div>
              ))}
            </section>
          )}
        </article>
      );
    }

    // ──────────────────── Staff: AI Insights ─────────────────
    function StaffInsights() {
      const [insights, setInsights] = useState(null);
      const [loading, setLoading] = useState(false);

      const getInsights = async () => {
        setLoading(true);
        try {
          const data = await api.get("/api/staff/insights");
          setInsights(data);
        } catch (e) {
          alert(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <article className="card" aria-labelledby="insights-heading">
          <h2 id="insights-heading">🧠 AI Staff Insights</h2>
          <p style={{color:"#5f6368",fontSize:"14px",marginBottom:"16px"}}>
            Gemini analyses live zone data and recommends staff deployment actions.
          </p>
          <button className="btn btn-primary" onClick={getInsights}
                  disabled={loading} aria-busy={loading}>
            {loading ? <><span className="spinner" aria-label="Generating…" /> Generating…</> : "⚡ Generate Insights"}
          </button>

          {insights && (
            <section className="result-panel" style={{marginTop:"16px"}} aria-live="polite">
              <div style={{fontSize:"12px",color:"#5f6368",marginBottom:"8px"}}>
                Zones analysed: {insights.zones_analyzed} · {new Date(insights.generated_at).toLocaleTimeString()}
              </div>
              <div style={{fontSize:"14px",lineHeight:"1.7",whiteSpace:"pre-line"}}>
                {insights.insights}
              </div>
            </section>
          )}
        </article>
      );
    }

    // ──────────────────── App Root ────────────────────────────
    function App() {
      const [mode, setMode] = useState("fan");

      return (
        <>
          <header role="banner">
            <div className="logo">
              <span className="logo-icon" aria-hidden="true">🏟️</span>
              <div>
                <h1>VenueFlow</h1>
                <p>Smart Stadium Experience Platform</p>
              </div>
            </div>
            <nav aria-label="View mode switcher">
              <div className="mode-toggle" role="group" aria-label="Select view mode">
                <button className={mode === "fan" ? "active" : ""}
                        onClick={() => setMode("fan")}
                        aria-pressed={mode === "fan"}
                        aria-label="Fan view">
                  🎟️ Fan
                </button>
                <button className={mode === "staff" ? "active" : ""}
                        onClick={() => setMode("staff")}
                        aria-pressed={mode === "staff"}
                        aria-label="Staff view">
                  👮 Staff
                </button>
              </div>
            </nav>
          </header>

          <main id="main-content" tabIndex="-1">
            {mode === "fan" ? (
              <>
                <div style={{background:"linear-gradient(135deg,#1a73e8,#34a853)",
                             color:"#fff",borderRadius:"16px",padding:"24px",
                             marginBottom:"20px"}}>
                  <h2 style={{fontSize:"22px",marginBottom:"8px",fontWeight:"700"}}>
                    Welcome to VenueFlow 👋
                  </h2>
                  <p style={{fontSize:"15px",opacity:0.9}}>
                    Beat the queues. Get there faster. Powered by Google AI.
                  </p>
                </div>
                <div className="grid-2">
                  <CrowdAnalyzer />
                  <RouteFinder />
                </div>
                <FanChat />
              </>
            ) : (
              <>
                <div style={{background:"linear-gradient(135deg,#202124,#5f6368)",
                             color:"#fff",borderRadius:"16px",padding:"24px",
                             marginBottom:"20px"}}>
                  <h2 style={{fontSize:"22px",marginBottom:"8px",fontWeight:"700"}}>
                    Staff Operations Dashboard 🎛️
                  </h2>
                  <p style={{fontSize:"15px",opacity:0.9}}>
                    Real-time crowd intelligence. AI-assisted deployment recommendations.
                  </p>
                </div>
                <StaffHeatmap />
                <div className="grid-2">
                  <StaffAlerts />
                  <StaffInsights />
                </div>
              </>
            )}
          </main>

          <footer role="contentinfo">
            <p>VenueFlow · Powered by Vertex AI · Google Maps · Cloud Translation · Firebase</p>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
